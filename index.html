<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#000000">
<title>CODE RAIN — evita el código rojo</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;
    font-family:"SF Mono",ui-monospace,"Cascadia Code",Menlo,Consolas,monospace;
    user-select:none;touch-action:none;cursor:none}
  #c{display:block;width:100vw;height:100vh}
  /* scanlines CRT */
  #scan{position:fixed;inset:0;pointer-events:none;z-index:5;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0)0,rgba(0,0,0,0)2px,rgba(0,0,0,.18)3px,rgba(0,0,0,0)4px);
    mix-blend-mode:multiply}
  #hud{position:fixed;inset:0;z-index:10;pointer-events:none;
    display:flex;align-items:center;justify-content:center;flex-direction:column;color:#9affc4}
  .card{pointer-events:auto;text-align:center;transition:opacity .3s,transform .3s}
  .hidden{opacity:0;transform:scale(.96);pointer-events:none}
  h1{font-size:clamp(38px,11vw,86px);font-weight:800;letter-spacing:.04em;color:#7CFFB0;
    text-shadow:0 0 24px rgba(60,255,140,.6),0 0 4px rgba(60,255,140,.9)}
  .blink{animation:bl 1s steps(1) infinite}@keyframes bl{50%{opacity:0}}
  .sub{margin-top:14px;font-size:clamp(12px,3.4vw,16px);color:#5fae7e;line-height:1.7}
  .sub b{color:#9affc4}
  .red{color:#ff4d6d;text-shadow:0 0 10px rgba(255,77,109,.7)}
  .hint{margin-top:30px;font-size:13px;color:#7CFFB0;opacity:.8}
  .big{font-size:clamp(56px,16vw,120px);font-weight:800;line-height:1}
  .fault{color:#ff4d6d;font-size:clamp(30px,9vw,64px);font-weight:800;letter-spacing:.05em;
    text-shadow:0 0 20px rgba(255,77,109,.7)}
  .lbl{font-size:12px;letter-spacing:.3em;text-transform:uppercase;opacity:.55;margin-top:18px}
  .val{font-size:clamp(40px,12vw,72px);font-weight:800;color:#7CFFB0;line-height:1}
  .best{margin-top:10px;font-size:14px;opacity:.7}
  #live{position:fixed;top:18px;left:0;right:0;z-index:10;pointer-events:none;
    display:flex;justify-content:space-between;padding:0 18px;color:#7CFFB0;
    font-size:clamp(13px,3.6vw,17px);font-weight:700;opacity:0;transition:opacity .25s;
    text-shadow:0 0 10px rgba(60,255,140,.5)}
  #live .r{color:#ff4d6d;text-shadow:0 0 10px rgba(255,77,109,.5)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="scan"></div>
<div id="live"><span id="sc">score 0</span><span id="bs" class="r">⬡ 0</span></div>
<div id="hud">
  <div id="start" class="card">
    <h1>CODE&nbsp;RAIN</h1>
    <div class="sub">
      arrastra el dedo / mueve el mouse: tú eres el <b>█ cursor</b><br>
      esquiva el <span class="red">código rojo</span> — si lo tocas, <span class="red">explota</span><br>
      recoge los <b>⬡ tokens</b> verdes para subir tu score
    </div>
    <div class="hint">toca / clic para iniciar <span class="blink">█</span></div>
  </div>
  <div id="over" class="card hidden">
    <div class="fault">SEGMENTATION FAULT</div>
    <div class="sub" style="margin-top:8px;opacity:.7">core dumped — el cursor tocó código rojo</div>
    <div class="lbl">score</div><div class="val" id="fsc">0</div>
    <div class="best" id="fbest"></div>
    <div class="hint" style="margin-top:24px">toca para reintentar <span class="blink">█</span></div>
  </div>
</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const startCard=document.getElementById('start'),overCard=document.getElementById('over');
const live=document.getElementById('live'),scEl=document.getElementById('sc'),bsEl=document.getElementById('bs');
const fsc=document.getElementById('fsc'),fbest=document.getElementById('fbest');

let W,H,DPR,FS,COLS;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  FS=Math.max(14,Math.min(20,W/26));            // tamaño de fuente del rain
  COLS=Math.ceil(W/FS);
  initRain();
}
addEventListener('resize',resize);

// ---- código real que llueve (se lee de verdad hacia abajo) ----
const CODE=`function quicksort(a){if(a.length<2)return a;const[p,...r]=a;const lo=r.filter(x=>x<p),hi=r.filter(x=>x>=p);return[...quicksort(lo),p,...quicksort(hi)];}
const fib=n=>n<2?n:fib(n-1)+fib(n-2);
for(let i=1;i<=100;i++)console.log(i%15?i%3?i%5?i:'Buzz':'Fizz':'FizzBuzz');
async function main(){const r=await fetch('/api');return r.json();}
#include <stdio.h>
int main(void){printf("hello, world\\n");return 0;}
while(alive){dodge(red);collect(token);score++;}
class Cursor{constructor(x,y){this.x=x;this.y=y;}move(t){this.x+=(t.x-this.x)*.25;}}

export default function App(){return <Canvas><Rain/></Canvas>;}

`.replace(/\n/g,' ');

// ---- rain ----
let cols;
function initRain(){
  cols=[];
  for(let i=0;i<COLS;i++){
    cols.push({head:-Math.floor(Math.random()*60),
      speed:.35+Math.random()*.55,
      ci:Math.floor(Math.random()*CODE.length),
      tail:[]});
  }
}

// ---- estado ----
const S={MENU:0,PLAY:1,DEAD:2};let state=S.MENU;
let cur,target,reds,tokens,parts,score,collected,frames,spawnR,spawnT,shake,glitch,diff;

function reset(){
  cur={x:W/2,y:H*0.7,trail:[]};
  target={x:W/2,y:H*0.7};
  reds=[];tokens=[];parts=[];
  score=0;collected=0;frames=0;spawnR=0;spawnT=0;shake=0;glitch=0;diff=1;
}

// ---- input: el cursor sigue el dedo / mouse ----
function setTarget(e){
  const x=e.touches?e.touches[0].clientX:e.clientX;
  const y=e.touches?e.touches[0].clientY:e.clientY;
  if(x!=null){target.x=x;target.y=y;}
}
addEventListener('pointermove',setTarget,{passive:true});
function press(e){
  if(e&&e.cancelable)e.preventDefault();
  setTarget(e);
  if(state===S.MENU)startGame();
  else if(state===S.DEAD&&frames>18)startGame();
}
addEventListener('pointerdown',press);
function startGame(){reset();state=S.PLAY;
  startCard.classList.add('hidden');overCard.classList.add('hidden');live.style.opacity='1';}

// ---- helpers ----
function rndChar(){return CODE[Math.floor(Math.random()*CODE.length)];}
function boom(x,y,color,n){for(let i=0;i<n;i++)parts.push({
  x,y,vx:(Math.random()-.5)*9,vy:(Math.random()-.5)*9,life:1,
  ch:Math.random()<.5?rndChar():'',color,r:Math.random()*3+1});}

function spawnRed(){
  const x=Math.floor(Math.random()*COLS)*FS+FS/2;
  reds.push({x,y:-FS,vy:(2.4+Math.random()*1.8)*diff,ch:rndChar(),wob:Math.random()*6});
}
function spawnToken(){
  const x=FS+Math.random()*(W-2*FS);
  tokens.push({x,y:-FS,vy:1.6+Math.random()*1.2,pulse:Math.random()*6});
}

// ---- update ----
function update(){
  // rain siempre corre (también en menú/over, de fondo)
  for(const c of cols){
    c.head+=c.speed;
    const hp=Math.floor(c.head);
    if(hp>(c.tail.length?c.tail[c.tail.length-1].row:-1)){
      c.tail.push({row:hp,ch:CODE[c.ci%CODE.length]});c.ci++;
      if(c.tail.length>22)c.tail.shift();
    }
    if(c.head*FS>H+22*FS){c.head=-Math.floor(Math.random()*30);c.tail=[];}
  }

  if(state!==S.PLAY){if(shake>.5)shake*=.85;if(glitch>0)glitch-=.04;return;}

  frames++;
  diff=1+frames/2600;                    // dificultad creciente
  score=Math.floor(frames/6)+collected*50;

  // cursor sigue al objetivo con suavizado
  cur.x+=(target.x-cur.x)*.30;
  cur.y+=(target.y-cur.y)*.30;
  cur.trail.push({x:cur.x,y:cur.y});if(cur.trail.length>10)cur.trail.shift();

  // spawns
  spawnR-=1;
  if(spawnR<=0){spawnRed();spawnR=Math.max(10,34-frames/120);}
  spawnT-=1;
  if(spawnT<=0){spawnToken();spawnT=70+Math.random()*60;}

  const R=Math.max(15,FS*0.95);          // radio de colisión del cursor

  // rojos
  for(const r of reds){
    r.y+=r.vy;r.wob+=0.1;
    const rx=r.x+Math.sin(r.wob)*3;
    if(Math.hypot(rx-cur.x,r.y-cur.y)<R){die();return;}
  }
  reds=reds.filter(r=>r.y<H+FS);

  // tokens
  for(const tk of tokens){
    tk.y+=tk.vy;tk.pulse+=0.15;
    if(Math.hypot(tk.x-cur.x,tk.y-cur.y)<R+8){
      tk.dead=true;collected++;boom(tk.x,tk.y,'#7CFFB0',10);
      bsEl.textContent='⬡ '+collected;
    }
  }
  tokens=tokens.filter(tk=>!tk.dead&&tk.y<H+FS);

  // partículas
  for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.life-=.025;}
  parts=parts.filter(p=>p.life>0);

  if(shake>.5)shake*=.86;if(glitch>0)glitch-=.05;

  scEl.textContent='score '+score;
}

let best=+(localStorage.getItem('coderain_best')||0);
function die(){
  state=S.DEAD;frames=0;shake=26;glitch=1;
  boom(cur.x,cur.y,'#ff4d6d',70);
  if(score>best){best=score;localStorage.setItem('coderain_best',best);}
  fsc.textContent=score;
  fbest.textContent=(score>=best&&score>0?'★ nuevo récord  ':'récord ')+best+'   ·   ⬡ '+collected;
  live.style.opacity='0';
  setTimeout(()=>overCard.classList.remove('hidden'),420);
}

// ---- render ----
function draw(){
  let sx=0,sy=0;
  if(shake>.5){sx=(Math.random()-.5)*shake;sy=(Math.random()-.5)*shake;}
  ctx.save();ctx.translate(sx,sy);

  // fade trail (efecto matrix)
  ctx.fillStyle='rgba(0,0,0,0.16)';ctx.fillRect(-40,-40,W+80,H+80);
  ctx.font=FS+'px monospace';ctx.textBaseline='top';

  // rain
  for(let i=0;i<cols.length;i++){
    const c=cols[i],x=i*FS;
    for(let j=0;j<c.tail.length;j++){
      const cell=c.tail[j],y=cell.row*FS;
      if(y< -FS||y>H)continue;
      const a=j/c.tail.length;
      if(j===c.tail.length-1){ctx.fillStyle='rgba(200,255,220,0.95)';}
      else{ctx.fillStyle=`rgba(60,220,120,${0.10+a*0.55})`;}
      ctx.fillText(cell.ch,x,y);
    }
  }

  if(state!==S.MENU){
    // tokens
    for(const tk of tokens){
      const g=0.6+Math.sin(tk.pulse)*0.4;
      ctx.shadowColor='#7CFFB0';ctx.shadowBlur=16*g;
      ctx.fillStyle='#9affc4';ctx.font=(FS*1.4|0)+'px monospace';
      ctx.fillText('⬡',tk.x-FS*0.5,tk.y-FS*0.5);
      ctx.shadowBlur=0;ctx.font=FS+'px monospace';
    }
    // rojos
    for(const r of reds){
      const rx=r.x+Math.sin(r.wob)*3;
      ctx.shadowColor='#ff2d55';ctx.shadowBlur=18;
      ctx.fillStyle='#ff4d6d';ctx.font='bold '+(FS*1.3|0)+'px monospace';
      ctx.fillText(r.ch,rx-FS*0.4,r.y);
      ctx.shadowBlur=0;ctx.font=FS+'px monospace';
    }
  }

  // partículas
  for(const p of parts){
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    if(p.ch){ctx.fillText(p.ch,p.x,p.y);}else{ctx.fillRect(p.x-p.r,p.y-p.r,p.r*2,p.r*2);}
  }
  ctx.globalAlpha=1;

  // cursor (caret que parpadea + estela + crosshair)
  if(state===S.PLAY){
    for(let i=0;i<cur.trail.length;i++){
      const t=cur.trail[i],a=i/cur.trail.length;
      ctx.fillStyle=`rgba(124,255,176,${a*0.30})`;
      ctx.fillRect(t.x-FS*0.35,t.y-FS*0.6,FS*0.7,FS*1.2);
    }
    ctx.strokeStyle='rgba(124,255,176,0.25)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cur.x-26,cur.y);ctx.lineTo(cur.x+26,cur.y);
    ctx.moveTo(cur.x,cur.y-26);ctx.lineTo(cur.x,cur.y+26);ctx.stroke();
    const blink=(Math.floor(frames/18)%2)===0;
    ctx.shadowColor='#7CFFB0';ctx.shadowBlur=20;
    ctx.fillStyle=blink?'#eafff2':'#7CFFB0';
    ctx.fillRect(cur.x-FS*0.38,cur.y-FS*0.66,FS*0.76,FS*1.3);
    ctx.shadowBlur=0;
  }

  // glitch flash al morir
  if(glitch>0){
    ctx.fillStyle=`rgba(255,45,85,${glitch*0.35})`;ctx.fillRect(-40,-40,W+80,H+80);
    for(let i=0;i<6;i++){const yy=Math.random()*H;
      ctx.fillStyle=`rgba(124,255,176,${glitch*0.4})`;
      ctx.fillRect(0,yy,W,Math.random()*4);}
  }

  ctx.restore();
}

function loop(){update();draw();requestAnimationFrame(loop);}
resize();reset();loop();
</script>
</body>
</html>
